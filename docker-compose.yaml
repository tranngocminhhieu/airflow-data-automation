---
x-airflow-common:
  &airflow-common
  image: apache/airflow:${AIRFLOW_VERSION}
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    # DAG bundles: each is a separate, named bundle (shown individually in the UI).
    # Local: "dags-folder" (primary, /opt/airflow/dags) + extra2/extra3 (additional folders).
    # Git: git1/git2 are appended ONLY when their GITn_REPO_URL is set in .env (via ${VAR:+...}),
    # so leaving them unset means no git bundle and no errors.
    # Written multi-line for readability via a YAML folded scalar (>-): YAML joins the lines with
    # spaces into one string before Compose interpolates, so the result is the same as one long line.
    AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST: >-
      [
      {"name": "dags-folder", "classpath": "airflow.dag_processing.bundles.local.LocalDagBundle", "kwargs": {}},
      {"name": "dags-folder-2", "classpath": "airflow.dag_processing.bundles.local.LocalDagBundle", "kwargs": {"path": "/opt/airflow/extra-dags/dags-folder-2"}},
      {"name": "dags-folder-3", "classpath": "airflow.dag_processing.bundles.local.LocalDagBundle", "kwargs": {"path": "/opt/airflow/extra-dags/dags-folder-3"}}${GIT1_REPO_URL:+,
      {"name": "git1", "classpath": "airflow.providers.git.bundles.git.GitDagBundle", "kwargs": {"git_conn_id": "git1", "tracking_ref": "${GIT1_REF:-main}", "subdir": "${GIT1_SUBDIR:-dags}", "refresh_interval": 60}}}${GIT2_REPO_URL:+,
      {"name": "git2", "classpath": "airflow.providers.git.bundles.git.GitDagBundle", "kwargs": {"git_conn_id": "git2", "tracking_ref": "${GIT2_REF:-main}", "subdir": "${GIT2_SUBDIR:-dags}", "refresh_interval": 60}}}
      ]
    # Git connections (SSH), one per git bundle. Each only used when its GITn_REPO_URL is set.
    AIRFLOW_CONN_GIT1: '{"conn_type": "git", "host": "${GIT1_REPO_URL:-}", "extra": {"key_file": "/opt/airflow/git-ssh/git1_key", "strict_host_key_checking": "no"}}'
    AIRFLOW_CONN_GIT2: '{"conn_type": "git", "host": "${GIT2_REPO_URL:-}", "extra": {"key_file": "/opt/airflow/git-ssh/git2_key", "strict_host_key_checking": "no"}}'
  volumes:
    # Primary DAGs folder (bundle "dags-folder").
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    # Extra DAG folders as separate bundles (see AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST above).
    # Mounted OUTSIDE /opt/airflow/dags so the primary bundle doesn't scan them twice.
    # Unused slots default to an auto-created empty dir (no DAGs, harmless).
    - ${DAGS_FOLDER_2:-./.extra_dags/dags-folder-2}:/opt/airflow/extra-dags/dags-folder-2
    - ${DAGS_FOLDER_3:-./.extra_dags/dags-folder-3}:/opt/airflow/extra-dags/dags-folder-3
    # SSH private keys for the git bundles (read-only), one per bundle. Set GITn_SSH_KEY in .env.
    - ${GIT1_SSH_KEY:-./.placeholder_ssh_key}:/opt/airflow/git-ssh/git1_key:ro
    - ${GIT2_SSH_KEY:-./.placeholder_ssh_key}:/opt/airflow/git-ssh/git2_key:ro
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    # Dedicated venv for business logic (used by ExternalPythonOperator).
    # Fully isolated from Airflow's own env, so Airflow stays stable.
    # Install extra packages anytime; they persist across restarts, no rebuild:
    #   docker compose exec airflow-scheduler /opt/airflow/pyenv/venv/bin/pip install <package>
    - airflow-pyenv:/opt/airflow/pyenv
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    deploy:
      resources:
        limits:
          # LocalExecutor runs tasks directly on the scheduler, so it needs more resources
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config,pyenv}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        # Create the business-logic venv if it doesn't exist (idempotent: re-running won't recreate it).
        # Only install apache-airflow (so ExternalPythonOperator has context); pipeline
        # packages can be pip installed later anytime.
        if [ ! -x /opt/airflow/pyenv/venv/bin/python3 ]; then
          echo "Creating business-logic venv at /opt/airflow/pyenv/venv"
          python -m venv /opt/airflow/pyenv/venv
          /opt/airflow/pyenv/venv/bin/pip install --upgrade pip
          /opt/airflow/pyenv/venv/bin/pip install "apache-airflow==${AIRFLOW_VERSION}"
        fi
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config,pyenv}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

volumes:
  postgres-db-volume:
  airflow-pyenv: