---
x-airflow-common:
  &airflow-common
  image: apache/airflow:${AIRFLOW_VERSION}
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    # DAG bundles: each is a separate, named bundle (shown individually in the UI).
    # Local: "dags-folder" (primary, /opt/airflow/dags) + extra2/extra3 (additional folders).
    # Git: git-1/git-2 are appended ONLY when their GIT_REPO_URL_n is set in .env (via ${VAR:+...}),
    # so leaving them unset means no git bundle and no errors.
    # Written multi-line for readability via a YAML folded scalar (>-): YAML joins the lines with
    # spaces into one string before Compose interpolates, so the result is the same as one long line.
    AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST: >-
      [
      {"name": "dags-folder", "classpath": "airflow.dag_processing.bundles.local.LocalDagBundle", "kwargs": {}},
      {"name": "dags-folder-2", "classpath": "airflow.dag_processing.bundles.local.LocalDagBundle", "kwargs": {"path": "/opt/airflow/extra-dags/dags-folder-2"}},
      {"name": "dags-folder-3", "classpath": "airflow.dag_processing.bundles.local.LocalDagBundle", "kwargs": {"path": "/opt/airflow/extra-dags/dags-folder-3"}}${GIT_REPO_URL_1:+,
      {"name": "git-1", "classpath": "airflow.providers.git.bundles.git.GitDagBundle", "kwargs": {"git_conn_id": "git_1", "tracking_ref": "${GIT_TRACKING_REF_1:-main}", "subdir": "${GIT_SUBDIR_1:-dags}", "refresh_interval": ${GIT_REFRESH_INTERVAL_1:-60}}}}${GIT_REPO_URL_2:+,
      {"name": "git-2", "classpath": "airflow.providers.git.bundles.git.GitDagBundle", "kwargs": {"git_conn_id": "git_2", "tracking_ref": "${GIT_TRACKING_REF_2:-main}", "subdir": "${GIT_SUBDIR_2:-dags}", "refresh_interval": ${GIT_REFRESH_INTERVAL_2:-60}}}}
      ]
    # Git connections (SSH), one per git bundle. Each only used when its GIT_REPO_URL_n is set.
    AIRFLOW_CONN_GIT_1: '{"conn_type": "git", "host": "${GIT_REPO_URL_1:-}", "extra": {"key_file": "/opt/airflow/git-ssh/git_1_key", "strict_host_key_checking": "no"}}'
    AIRFLOW_CONN_GIT_2: '{"conn_type": "git", "host": "${GIT_REPO_URL_2:-}", "extra": {"key_file": "/opt/airflow/git-ssh/git_2_key", "strict_host_key_checking": "no"}}'
    # Interpreter of the business-logic venv (the airflow-pyenv volume below), used by
    # ExternalPythonOperator / @task.external_python. Fixed wiring tied to that volume.
    EXTERNAL_PYTHON: /opt/airflow/pyenv/venv/bin/python3
    # Object Storage XCom backend: XCom values larger than the threshold are offloaded to the
    # filesystem (/opt/airflow/data/xcom) instead of the metadata DB; values <= threshold stay in
    # the DB. Lets tasks return/accept DataFrames directly (see dags/demo_xcom_storage.py).
    AIRFLOW__CORE__XCOM_BACKEND: airflow.providers.common.io.xcom.backend.XComObjectStorageBackend
    AIRFLOW__COMMON_IO__XCOM_OBJECTSTORAGE_PATH: file:///opt/airflow/data/xcom
    AIRFLOW__COMMON_IO__XCOM_OBJECTSTORAGE_THRESHOLD: '1048576'   # 1 MiB; MUST be > -1 (-1 disables offload)
    AIRFLOW__COMMON_IO__XCOM_OBJECTSTORAGE_COMPRESSION: gzip      # works out-of-the-box; do NOT use snappy
    # NOTE: Airflow's base env needs pandas+pyarrow to (de)serialize DataFrames returned by
    # external_python tasks before the backend offloads them. The apache/airflow image already
    # ships both (pulled in by its bundled providers), so no extra install is required here.

    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW__CORE__DEFAULT_TIMEZONE:-utc}
  volumes:
    # Primary DAGs folder (bundle "dags-folder").
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    # Extra DAG folders as separate bundles (see AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST above).
    # Mounted OUTSIDE /opt/airflow/dags so the primary bundle doesn't scan them twice.
    # Unused slots default to an auto-created empty dir (no DAGs, harmless).
    - ${DAGS_FOLDER_2:-./.extra_dags/dags-folder-2}:/opt/airflow/extra-dags/dags-folder-2
    - ${DAGS_FOLDER_3:-./.extra_dags/dags-folder-3}:/opt/airflow/extra-dags/dags-folder-3
    # SSH private keys for the git bundles (read-only), one per bundle. Set GIT_SSH_KEY_n in .env.
    - ${GIT_SSH_KEY_1:-./.placeholder_ssh_key}:/opt/airflow/git-ssh/git_1_key:ro
    - ${GIT_SSH_KEY_2:-./.placeholder_ssh_key}:/opt/airflow/git-ssh/git_2_key:ro
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    # Shared working area for large data passed between tasks (see dags/demo.py).
    # Tasks exchange parquet file PATHS via XCom; the data itself lives here on disk.
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data
    # Dedicated venv for business logic (used by ExternalPythonOperator).
    # Fully isolated from Airflow's own env, so Airflow stays stable.
    # Install extra packages anytime; they persist across restarts, no rebuild:
    #   docker compose exec airflow-scheduler /opt/airflow/pyenv/venv/bin/pip install <package>
    - airflow-pyenv:/opt/airflow/pyenv
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    # Direct host access (LOCAL mode). Comment this out in domain mode: Traefik fronts the UI,
    # and freeing host port 8080 avoids clashing with Traefik's own dashboard on 8080.
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    # --- Reverse proxy (Traefik) — OFF by default; the stack deploys standalone on
    # 127.0.0.1:8080 (see ports above). To route a public domain through Traefik:
    #   1. docker network create proxy_net   (a shared external network with your Traefik)
    #   2. set AIRFLOW_HOST in .env
    #   3. comment out the "ports" block above (Traefik fronts the UI; this also frees host
    #      port 8080, which Traefik's dashboard uses)
    #   4. uncomment the two blocks below AND the proxy_net network at the bottom of this file

    # networks:
    #   - default      # keep internal connectivity (postgres + scheduler) alongside the proxy
    #   - proxy_net
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.airflow.rule=Host(`${AIRFLOW_HOST}`)"
    #   - "traefik.http.routers.airflow.entrypoints=websecure"
    #   - "traefik.http.routers.airflow.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.airflow.loadbalancer.server.port=8080"
    #   - "traefik.docker.network=proxy_net"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config,pyenv,data,data/xcom}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        # Create the business-logic venv if it doesn't exist (idempotent: re-running won't recreate it).
        # Only install apache-airflow (so ExternalPythonOperator has context); pipeline
        # packages can be pip installed later anytime.
        if [ ! -x /opt/airflow/pyenv/venv/bin/python3 ]; then
          echo "Creating business-logic venv at /opt/airflow/pyenv/venv"
          python -m venv /opt/airflow/pyenv/venv
          /opt/airflow/pyenv/venv/bin/pip install --upgrade pip
          /opt/airflow/pyenv/venv/bin/pip install "apache-airflow==${AIRFLOW_VERSION}"
        fi
        # chown only the dirs we own; avoid recursing into /opt/airflow/git-ssh
        # (read-only key mounts would error with "Read-only file system").
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config,pyenv,data}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

volumes:
  postgres-db-volume:
  airflow-pyenv:

# Uncomment together with the Traefik block on airflow-apiserver to route a public domain.
# proxy_net is shared with your Traefik instance, so create it first: docker network create proxy_net
#networks:
#  proxy_net:
#    external: true